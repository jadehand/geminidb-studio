name: Build Windows installers

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Check frontend and Bridge
        run: |
          npm run check
          npm run test:bridge
          node --test apps/web/src/*.test.mjs

      - name: Build MSI and setup EXE
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target x86_64-pc-windows-msvc
          uploadWorkflowArtifacts: true
          workflowArtifactNamePattern: geminidb-studio-windows-x64-[bundle]
          tagName: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}
          releaseName: GeminiDB Studio ${{ github.ref_name }}
          releaseBody: 自动构建的 Windows x64 MSI 与 NSIS 安装包，更新内容见 CHANGELOG.md。
          releaseDraft: false
          prerelease: false

      - name: Verify Windows bundles and Sidecar
        shell: pwsh
        run: |
          $sidecar = Get-Item "src-tauri/binaries/geminidb-bridge-x86_64-pc-windows-msvc.exe" -ErrorAction Stop
          if ($sidecar.Length -le 0) { throw "Bridge Sidecar is empty" }
          $bundles = Get-ChildItem "src-tauri/target/x86_64-pc-windows-msvc/release/bundle" -Recurse -File |
            Where-Object { $_.Extension -eq ".msi" -or $_.Name -like "*setup.exe" }
          if (-not $bundles) { throw "No Windows installer bundle was generated" }
          $bundles | ForEach-Object { Write-Host "$($_.FullName) $($_.Length) bytes" }
